version: "3.9"

services:

  db:
    image: postgres:15
    container_name: postgres_asso
    restart: always
    environment:
      POSTGRES_DB: gestion_associative
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: django_backend
    restart: always
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: gestion_associative
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    # Note: the container image's ENTRYPOINT handles migrations and runserver

  frontend:
    build: ./frontend
    container_name: react_frontend
    restart: always
    volumes:
      - ./frontend:/app
      # Préserver les dépendances installées dans le conteneur
      - /app/node_modules
    ports:
      - "3001:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL=http://localhost:8000/api

volumes:
  postgres_data:

